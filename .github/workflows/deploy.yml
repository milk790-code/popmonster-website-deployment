name: Deploy Static Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract bundle
        run: |
          if [ -f popmonster-pages.zip ]; then
            mkdir -p site
            unzip -o popmonster-pages.zip -d site
            echo "✓ Bundle extracted to site/"
            ls -la site/ | head -20
          else
            echo "⚠ popmonster-pages.zip not found, staging root directory"
            mkdir -p site
            rsync -a --exclude='.git' --exclude='.github' --exclude='site' ./ site/
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          cname: popmonster.vip
